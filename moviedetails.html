<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- SPECIAL FONT FAMILY -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <script src="https://kit.fontawesome.com/77b2447c2a.js" crossorigin="anonymous"></script>
    <title>Batcave-about</title>
</head>

<body class="moviedetails-page">
    <div class="page-bg-blur" id="page-bg-blur"></div>
    <div class="scanline-overlay"></div>

    <div id="movie-details">
        <p class="go-back"><a href="movies.html" rel="noopener noreferrer">
                <i class="fa-solid fa-arrow-left LEFT-ARROW"></i> Back</a>
        </p>
        <div class="movie-detail-container">
            <div class="batcomputer-hud-header">
                <div class="hud-status">
                    <span class="hud-pulse"></span>
                    <span>SECURE DATALINK // ARCHIVE_0x7B9C</span>
                </div>
                <div class="hud-serial">SYS.LOC: GOTHAM.MAIN // ACCESS: LEVEL_ALPHA</div>
            </div>

            <div class="movie-details-poster">
                <div class="movie-poster-image">
                    <img src="" alt="" class="movie-image-poster">
                </div>
                <div class="movie-details">
                    <p class="movie-detail-title"> </p>
                    <p class="movie-detail-year">

                    </p>

                    <div class="other-details">
                        <div class="hour-genres">
                            <p class="movie-detail-hour"> </p>
                            <p class="movie-detail-genres">
                                <span></span>
                                <span></span>
                                <span> </span>

                            </p>
                        </div>


                        <p class="movie-detail-rating">
                            <i class="fa fa-star STAR"></i> 4<span>IMDb</span>
                        </p>
                        <p class="movie-detail-overview">

                        </p>

                        <p class="movie-trailer"><a href="" target="_parent" rel="noopener noreferrer"></a>
                            Watch Trailer <i class="fa-solid fa-play PLAY"></i> </a>
                        </p>
                    </div>
                </div>
            </div>
            <div class="stream-container">
                <p class="watch-on">
                    Watch
                </p>
                <div class="streaming-box">
                    <div class="stream-box-1">
                        <a href="http://" target="_blank" rel="noopener noreferrer"><img src="" alt=""
                                class="stream-image"></a>
                        <p class="stream-name"></p>
                    </div>
                </div>

            </div>


            <div class="movie-story-line">

                <p class="story-line">Story Line</p>
                <div class="story">
                    <p class="story-text">

                    </p>
                </div>
            </div>


        </div>
    </div>

    <script src="movies-data.js"></script>
    <script src="script.js"></script>
    <script src="moviedetails.js"></script>
</body>

</html>
